name: Generate Snake
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@master
        with:
          github_user_name: POWDER-RANGER
          svg_out_path: dist/github-snake.svg
      - uses: crazy-max/ghaction-import-gpg@v6
      - uses: stefanzweifel/git-auto-commit-action@v5
